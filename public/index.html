<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生涯規劃進度儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(0.971 0.006 80); --bg-grid: oklch(0.915 0.010 78);
    --surface: oklch(0.992 0.004 80); --ink: oklch(0.265 0.016 62);
    --ink-soft: oklch(0.475 0.014 62); --ink-faint: oklch(0.560 0.013 62);
    --rule: oklch(0.880 0.011 76);
    --major: oklch(0.490 0.072 168); --minor: oklch(0.470 0.105 256);
    --cross: oklch(0.460 0.130 50); --edge: oklch(0.470 0.155 352);
    --exam: oklch(0.500 0.130 64); --dup: oklch(0.520 0.140 40);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: clamp(15px, 0.9rem + 0.2vw, 17px); }
  body {
    font-family: "Noto Sans TC", system-ui, sans-serif; color: var(--ink);
    background-color: var(--bg);
    background-image: linear-gradient(var(--bg-grid) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 2.25rem 2.25rem;
    line-height: 1.6; -webkit-font-smoothing: antialiased; padding: clamp(1.25rem, 3vw, 3rem);
  }
  .wrap { max-width: 60rem; margin: 0 auto; }
  header { border: 1.5px solid var(--ink); background: var(--surface); border-radius: 0.625rem; padding: clamp(1.5rem, 4vw, 2.5rem); margin-bottom: 1.5rem; }
  .tag { font-family: "JetBrains Mono", monospace; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); }
  h1 { font-family: "Archivo", "Noto Sans TC", sans-serif; font-weight: 900; font-size: clamp(1.8rem, 1.1rem + 3vw, 3rem); letter-spacing: -0.02em; margin: 0.4rem 0; }
  .lede { color: var(--ink-soft); max-width: 50ch; }

  section.card { background: var(--surface); border: 1px solid var(--rule); border-radius: 0.625rem; padding: clamp(1.1rem, 2.5vw, 1.6rem); margin-bottom: 1.5rem; }
  h2 { font-weight: 900; font-size: 1.25rem; margin-bottom: 1rem; letter-spacing: -0.01em; }

  /* 進度條 */
  .bars { display: grid; gap: 0.9rem; }
  .bar-row { display: grid; grid-template-columns: 5rem 1fr auto; align-items: center; gap: 0.9rem; }
  .bar-row .lbl { font-weight: 700; font-size: 0.9rem; }
  .track { height: 0.85rem; background: oklch(0.92 0.006 80); border-radius: 1rem; overflow: visible; position: relative; }
  .marker { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 0.55rem; height: 1.2rem; border: 2px solid oklch(0.28 0.012 60); background: var(--surface); border-radius: 3px; transition: left 0.5s cubic-bezier(0.22,1,0.36,1); pointer-events: none; box-shadow: 0 1px 2px oklch(0.28 0.012 60 / 0.25); }
  .track.major { background: color-mix(in oklch, var(--major) 34%, var(--surface)); }
  .track.minor { background: color-mix(in oklch, var(--minor) 34%, var(--surface)); }
  .track.cross { background: color-mix(in oklch, var(--cross) 34%, var(--surface)); }
  .track.gen   { background: color-mix(in oklch, var(--ink-faint) 30%, var(--surface)); }
  .track.exam  { background: color-mix(in oklch, var(--exam) 34%, var(--surface)); }
  .track.edge  { background: color-mix(in oklch, var(--edge) 34%, var(--surface)); }
  .fill { height: 100%; border-radius: 1rem; transition: width 0.5s cubic-bezier(0.22,1,0.36,1); }
  .fill.major { background: var(--major); } .fill.minor { background: var(--minor); } .fill.cross { background: var(--cross); } .fill.gen { background: var(--ink-faint); }
  .fill.exam { background: var(--exam); } .fill.edge { background: var(--edge); }
  .fill.full { background: oklch(0.62 0.14 155); }
  .bar-row .val b { color: var(--ink); font-weight: 800; }
  .bar-row .val { font-family: "JetBrains Mono", monospace; font-size: 0.8rem; color: var(--ink-soft); white-space: nowrap; }

  ul { list-style: none; }
  li.row { display: grid; grid-template-columns: 1.4rem 1fr auto; align-items: center; gap: 0.8rem; padding: 0.6rem 0; border-top: 1px solid color-mix(in oklch, var(--rule) 55%, transparent); }
  li.row:first-child { border-top: none; }
  input[type=checkbox] { width: 1.15rem; height: 1.15rem; accent-color: var(--major); cursor: pointer; }
  li.done .nm { color: var(--ink-faint); text-decoration: line-through; }
  .nm { font-weight: 600; }
  .nm .en { font-family: "JetBrains Mono", monospace; font-size: 0.72rem; color: var(--ink-faint); margin-left: 0.45rem; }
  .meta { display: flex; gap: 0.45rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .src { font-size: 0.68rem; font-weight: 600; padding: 0.14rem 0.5rem; border-radius: 1rem; }
  .src.major { color: var(--major); background: oklch(0.945 0.03 168); }
  .src.minor { color: var(--minor); background: oklch(0.945 0.035 256); }
  .src.cross { color: var(--cross); background: oklch(0.945 0.045 60); }
  .src.gen   { color: var(--ink-soft); background: oklch(0.928 0.005 70); }
  .src.campus { color: var(--major); background: oklch(0.945 0.03 168); }
  .src.selflearn { color: var(--cross); background: oklch(0.945 0.045 60); }
  .src.edge { color: var(--edge); background: oklch(0.955 0.03 352); }
  .mk { font-size: 0.72rem; font-weight: 700; }
  .mk.exam { color: var(--exam); } .mk.dup { color: var(--dup); }
  .cr { font-family: "JetBrains Mono", monospace; font-size: 0.8rem; color: var(--ink-faint); }
  .loading { color: var(--ink-faint); font-size: 0.9rem; }
  :focus-visible { outline: 2px solid var(--cross); outline-offset: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="tag">Cloudflare Pages + Workers + D1 · 本地開發中</div>
    <h1>生涯規劃進度儀表板</h1>
    <p class="lede">勾選已修的課，學分進度條即時更新。資料存在 D1，經 Workers API 讀寫。</p>
    <p class="tag" id="lock" style="margin-top:0.7rem"></p>
  </header>

  <section class="card">
    <h2>學分進度</h2>
    <div class="bars" id="bars"><p class="loading">載入中…</p></div>
  </section>

  <section class="card">
    <h2>修課清單</h2>
    <ul id="courses"><li class="loading">載入中…</li></ul>
  </section>

  <section class="card">
    <h2>技能</h2>
    <ul id="skills"><li class="loading">載入中…</li></ul>
  </section>
</div>

<script>
  const api = (path, opts) => fetch("/api" + path, opts).then(r => r.json());
  const srcName = { major: "資管必修", minor: "資工第二主修", cross: "加修", gen: "通識", campus: "校內", selflearn: "自補", edge: "差異化" };

  // ---- 編輯權限：只有輸入過管理密碼的人能改，密碼存本機瀏覽器 ----
  const getToken = () => localStorage.getItem("adminToken") || "";
  function renderLock() {
    const el = document.getElementById("lock");
    const editable = !!getToken();
    el.innerHTML = editable
      ? '🔓 編輯模式 · <a href="#" id="lockBtn">鎖定</a>'
      : '🔒 唯讀模式 · <a href="#" id="lockBtn">解鎖編輯</a>';
    document.querySelectorAll('#courses input[type=checkbox], #skills input[type=checkbox]')
      .forEach(c => { c.disabled = !editable; });
  }
  document.addEventListener("click", (e) => {
    if (e.target.id !== "lockBtn") return;
    e.preventDefault();
    if (getToken()) localStorage.removeItem("adminToken");
    else { const p = prompt("輸入管理密碼"); if (p) localStorage.setItem("adminToken", p); }
    renderLock();
  });

  async function loadStats() {
    const [stats, courses, skills] = await Promise.all([api("/stats"), api("/courses"), api("/skills")]);
    const rows = stats.map(s => ({ label: srcName[s.source] || s.source, done: s.done, total: s.total, unit: "學分", cls: s.source }));
    const exT = courses.filter(c => c.exam).reduce((a, c) => a + c.credits, 0);
    const exD = courses.filter(c => c.exam && c.done).reduce((a, c) => a + c.credits, 0);
    rows.push({ label: "考研考科", done: exD, total: exT, unit: "學分", cls: "exam" });
    rows.push({ label: "技能完成", done: skills.filter(s => s.done).length, total: skills.length, unit: "項", cls: "edge" });
    const bars = document.getElementById("bars");
    bars.innerHTML = rows.map(b => {
      const pct = b.total ? Math.round(b.done / b.total * 100) : 0;
      const full = pct >= 100 ? " full" : "";
      return `<div class="bar-row">
        <span class="lbl">${b.label}</span>
        <span class="track ${b.cls}"><span class="fill ${b.cls}${full}" style="width:${pct}%"></span><span class="marker" style="left:${pct}%"></span></span>
        <span class="val"><b>${pct}%</b> · ${b.done}/${b.total} ${b.unit}</span>
      </div>`;
    }).join("");
  }

  function rowHTML(item, type) {
    const marks = (item.exam ? '<span class="mk exam">★考研</span>' : '') + (item.dup ? '<span class="mk dup">△重疊</span>' : '');
    const extra = type === "course" ? `<span class="cr">${item.credits}學分</span>` : '';
    return `<li class="row ${item.done ? 'done' : ''}" data-type="${type}" data-id="${item.id}">
      <input type="checkbox" ${item.done ? 'checked' : ''}>
      <span class="nm">${item.name}${item.en ? `<span class="en">${item.en}</span>` : ''}</span>
      <span class="meta">${extra}<span class="src ${item.source}">${srcName[item.source] || item.source}</span>${marks}</span>
    </li>`;
  }

  async function loadList(path, elId, type) {
    const list = await api(path);
    document.getElementById(elId).innerHTML = list.map(i => rowHTML(i, type)).join("");
  }

  // 勾選 → 帶 admin token PATCH → 沒權限會被擋（401）
  document.addEventListener("change", async (e) => {
    if (e.target.type !== "checkbox") return;
    const li = e.target.closest("li.row");
    const done = e.target.checked;
    const res = await fetch("/api/progress", {
      method: "PATCH",
      headers: { "content-type": "application/json", "X-Admin-Token": getToken() },
      body: JSON.stringify({ item_type: li.dataset.type, item_id: Number(li.dataset.id), done })
    });
    if (!res.ok) {
      e.target.checked = !done;
      localStorage.removeItem("adminToken");
      renderLock();
      alert("沒有權限或密碼錯誤。請點右上『解鎖編輯』輸入正確的管理密碼。");
      return;
    }
    li.classList.toggle("done", done);
    loadStats();
  });

  loadStats();
  Promise.all([
    loadList("/courses", "courses", "course"),
    loadList("/skills", "skills", "skill"),
  ]).then(renderLock);
</script>
</body>
</html>
